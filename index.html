<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <article class="product-card">
        <img
          class="product-image"
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80"
          alt="Red running shoe"
        />

        <div class="product-content">
          <p class="product-category">Running Shoes</p>
          <h1 class="product-name">Velocity Runner Pro</h1>
          <p class="product-description">
            Lightweight support, breathable mesh, and everyday comfort for quick
            training sessions.
          </p>

          <div class="product-footer">
            <p class="product-price">$89.99</p>
            <button class="cart-button" type="button">Add to Cart</button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
